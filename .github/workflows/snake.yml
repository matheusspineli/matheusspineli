name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # roda todo dia à meia-noite
  workflow_dispatch:       # permite rodar manualmente

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mathuesspineli
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=30BF86

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

**3. Ative as permissões da Action**

Vá em:
`Settings → Actions → General → Workflow permissions`
→ Marque **"Read and write permissions"** e salve.

---

**4. Rode manualmente pela primeira vez**

Vá em:
`Actions → Generate Snake → Run workflow`

Isso vai criar o branch `output` com os SVGs gerados.

---

**5. Verifique o README**

Os links já estão certos no seu README:
```
https://raw.githubusercontent.com/mathuesspineli/mathuesspineli/output/pacman-contribution-graph-dark.svg
